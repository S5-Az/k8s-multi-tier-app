kind: Deployment
apiVersion: apps/v1
metadata:
  name: t3.frontend.deployment
  namespace: project1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: nginx:latest
        ports:
        - containerPort: 80


